<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Web con API - TP</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <header class="header">
        <nav class="nav">
            <div class="logo">GibliInfo / GeekApp</div>
            <ul class="nav-links">
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Favoritos</a></li>
            </ul>
        </nav>

    <main class="contenedor-principal">

            <div class="buscador-box">
                <input type="text" id="input-busqueda" placeholder="Ej. Rick, Pikachu, Batman...">

            </div>

        <section id="contenedor-tarjetas" class="grid-tarjetas">
            </section>

    <script src="script.js"></script>
